name: Build & Push Multi-Arch Docker Images

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/unift-api
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag

      - name: Extract metadata for FE
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/unift-fe
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag

      - name: Build & Push unift-api
        uses: docker/build-push-action@v5
        with:
          context: ./unift
          file: ./unift/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push unift-fe
        uses: docker/build-push-action@v5
        with:
          context: ./unift-fe
          file: ./unift-fe/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_APP_NAME=UniFT
            VITE_APP_VERSION=${{ github.sha }}
            VITE_ENABLE_DARK_MODE=true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max