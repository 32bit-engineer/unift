name: Build & Push Docker Images

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────
      # Build & Push Backend
      # ─────────────────────────────
      - name: Build & Push unift-api
        uses: docker/build-push-action@v5
        with:
          context: ./unift
          file: ./unift/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/unift-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/unift-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────
      # Build & Push Frontend
      # ─────────────────────────────
      - name: Build & Push unift-fe
        uses: docker/build-push-action@v5
        with:
          context: ./unift-fe
          file: ./unift-fe/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_APP_NAME=UniFT
            VITE_APP_VERSION=${{ github.sha }}
            VITE_ENABLE_DARK_MODE=true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/unift-fe:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/unift-fe:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max