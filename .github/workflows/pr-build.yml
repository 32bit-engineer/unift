name: PR Build Pipelineon:  pull_request:    branches: ["main"]    types: [opened, synchronize, reopened, ready_for_review]concurrency:  group: pr-build-${{ github.event.pull_request.number }}  cancel-in-progress: truejobs:  backend-build:    name: Backend Build (Gradle)    runs-on: ubuntu-latest    defaults:      run:        working-directory: unift    steps:      - name: Checkout code        uses: actions/checkout@v4      - name: Set up Java 24        uses: actions/setup-java@v4        with:          distribution: temurin          java-version: "24"          cache: gradle      - name: Make Gradle wrapper executable        run: chmod +x gradlew      - name: Run backend build pipeline        run: ./gradlew clean build  frontend-build:    name: Frontend Build (Vite)     runs-on: ubuntu-latest    defaults:      run:        working-directory: unift-fe    steps:      - name: Checkout code        uses: actions/checkout@v4      - name: Set up Node.js        uses: actions/setup-node@v4        with:          node-version: "22"          cache: npm          cache-dependency-path: unift-fe/package-lock.json      - name: Install dependencies        run: npm ci      - name: Run frontend build pipeline        run: npm run build