server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The frontend JS calls the backend directly at http://localhost:8080.
    # Nginx here only serves the static React bundle — no proxy rules needed.

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~* \.(js|css|png|svg|ico|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
