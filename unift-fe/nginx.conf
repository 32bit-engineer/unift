server {    listen 80;    server_name _;    root /usr/share/nginx/html;    index index.html;    # ─────────────────────────────────────────────    # WebSocket — terminal proxy (must be before /api/)    # Handles ws://host/api/ws/* connections    # ─────────────────────────────────────────────    location /api/ws/ {        proxy_pass http://unift-api:8080;        proxy_http_version 1.1;        proxy_set_header Upgrade $http_upgrade;        proxy_set_header Connection "upgrade";        proxy_set_header Host $host;        proxy_set_header X-Real-IP $remote_addr;        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        proxy_set_header X-Forwarded-Proto $scheme;        proxy_set_header Origin $http_origin;        # Keep WebSocket connections alive        proxy_read_timeout 3600s;        proxy_send_timeout 3600s;        proxy_connect_timeout 10s;    }    # ─────────────────────────────────────────────    # REST API & Swagger — proxy to Spring Boot    # ─────────────────────────────────────────────    location /api/ {        proxy_pass http://unift-api:8080;        proxy_http_version 1.1;        proxy_set_header Host $host;        proxy_set_header X-Real-IP $remote_addr;        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        proxy_set_header X-Forwarded-Proto $scheme;        proxy_connect_timeout 10s;        proxy_read_timeout 60s;        proxy_send_timeout 60s;        # Disable buffering for SSE / streaming responses        proxy_buffering off;    }    # ─────────────────────────────────────────────    # Swagger UI (Spring Boot serves these)    # ─────────────────────────────────────────────    location /swagger-ui/ {        proxy_pass http://unift-api:8080;        proxy_http_version 1.1;        proxy_set_header Host $host;        proxy_set_header X-Real-IP $remote_addr;        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        proxy_set_header X-Forwarded-Proto $scheme;    }    location /v3/ {        proxy_pass http://unift-api:8080;        proxy_http_version 1.1;        proxy_set_header Host $host;        proxy_set_header X-Real-IP $remote_addr;        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        proxy_set_header X-Forwarded-Proto $scheme;    }    # ─────────────────────────────────────────────    # SPA fallback — all other paths serve index.html    # ─────────────────────────────────────────────    location / {        try_files $uri $uri/ /index.html;    }    # Prevent caching of index.html so deploys take effect immediately    location = /index.html {        add_header Cache-Control "no-store, no-cache, must-revalidate";    }    # Long-cache for hashed static assets (JS/CSS/images)    location ~* \.(js|css|png|svg|ico|woff2|woff|ttf|eot)$ {        expires 1y;        add_header Cache-Control "public, immutable";    }}