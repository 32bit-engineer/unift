name: Buildon:  # Run on every push to main (i.e. when a PR is merged)  push:    branches: [ main ]  # Also run as a pre-merge check on every PR that targets main  pull_request:    branches: [ main ]jobs:  build:    name: Compile & Package    runs-on: ubuntu-latest    steps:      # -----------------------------------------------------------------------      # 1. Checkout      # -----------------------------------------------------------------------      - name: Checkout code        uses: actions/checkout@v4      # -----------------------------------------------------------------------      # 2. Java 24 (Temurin)      # -----------------------------------------------------------------------      - name: Set up Java 24        uses: actions/setup-java@v4        with:          java-version: '24'          distribution: 'temurin'      # -----------------------------------------------------------------------      # 3. Gradle cache — speeds up subsequent runs significantly      # -----------------------------------------------------------------------      - name: Cache Gradle packages        uses: actions/cache@v4        with:          path: |            ~/.gradle/caches            ~/.gradle/wrapper          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}          restore-keys: |            gradle-${{ runner.os }}-      # -----------------------------------------------------------------------      # 4. Validate Gradle wrapper (security: ensures wrapper jar isn't tampered)      # -----------------------------------------------------------------------      - name: Validate Gradle wrapper        uses: gradle/actions/wrapper-validation@v4      # -----------------------------------------------------------------------      # 5. Make gradlew executable (needed when the bit isn't set in git)      # -----------------------------------------------------------------------      - name: Make gradlew executable        run: chmod +x ./gradlew      # -----------------------------------------------------------------------      # 6. Build — compile + package, skip tests (no DB available in CI)      #    Add `-Dspring.profiles.active=ci` when you add a ci application profile      # -----------------------------------------------------------------------      - name: Build with Gradle        run: ./gradlew build -x test --no-daemon      # -----------------------------------------------------------------------      # 7. Upload the fat JAR as a build artifact (available in Actions → run)      # -----------------------------------------------------------------------      - name: Upload JAR artifact        uses: actions/upload-artifact@v4        with:          name: unift-${{ github.sha }}          path: build/libs/*.jar          retention-days: 7