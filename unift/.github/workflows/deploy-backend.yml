name: Deploy Backendon:  push:    branches: [main]    paths:      - 'unift/**'   # ONLY trigger on backend changesjobs:  deploy:    runs-on: ubuntu-latest    steps:      - name: SSH & Deploy        uses: appleboy/ssh-action@v1.0.0        with:          host: ${{ secrets.SERVER_IP }}          username: ${{ secrets.SERVER_USER }}          key: ${{ secrets.SERVER_SSH_KEY }}          script: |            cd ~/app            if [ ! -d ".git" ]; then              git clone https://github.com/32bit-engineer/unift.git .            else              git pull            fi            cd unift            docker stop backend || true            docker rm backend || true            docker build -t backend .            docker run -d -p 8080:8080 \              --memory="512m" \              --cpus="0.5" \              --name backend backend