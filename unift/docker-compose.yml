services:  # ─────────────────────────────────────────────  # PostgreSQL — persistent storage  # ─────────────────────────────────────────────  postgres:    image: postgres:16-alpine    container_name: unift-postgres    restart: unless-stopped    environment:      POSTGRES_DB: ${POSTGRES_DB:unift}      POSTGRES_USER: ${POSTGRES_USER:unift}      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}    volumes:      - postgres_data:/var/lib/postgresql/data    ports:      - "${POSTGRES_PORT:-5432}:5432"    healthcheck:      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:unift} -d ${POSTGRES_DB:unift}"]      interval: 10s      timeout: 5s      retries: 5  # ─────────────────────────────────────────────  # Zookeeper — required by Kafka  # ─────────────────────────────────────────────  zookeeper:    image: confluentinc/cp-zookeeper:7.6.0    container_name: unift-zookeeper    restart: unless-stopped    environment:      ZOOKEEPER_CLIENT_PORT: 2181      ZOOKEEPER_TICK_TIME: 2000    volumes:      - zookeeper_data:/var/lib/zookeeper/data      - zookeeper_log:/var/lib/zookeeper/log  # ─────────────────────────────────────────────  # Kafka — event broker (audit log)  # ─────────────────────────────────────────────  kafka:    image: confluentinc/cp-kafka:7.6.0    container_name: unift-kafka    restart: unless-stopped    depends_on:      - zookeeper    environment:      KAFKA_BROKER_ID: 1      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:9092}      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"    volumes:      - kafka_data:/var/lib/kafka/data    ports:      - "${KAFKA_HOST_PORT:-9092}:9092"    healthcheck:      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]      interval: 15s      timeout: 10s      retries: 5  # ─────────────────────────────────────────────  # UniFT — application  # ─────────────────────────────────────────────  unift:    build:      context: .      dockerfile: Dockerfile    image: unift:latest    container_name: unift-app    restart: unless-stopped    depends_on:      postgres:        condition: service_healthy      kafka:        condition: service_healthy    ports:      - "${APP_PORT:-8080}:8080"    volumes:      # Mount local storage paths you want UniFT to manage.      # Add or remove paths to match your setup.      - ${STORAGE_PATH:-/mnt/storage}:/mnt/storage:rw    environment:      # ── Database      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-unift}      DB_USERNAME: ${POSTGRES_USER:-unift}      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}      # ── Kafka      KAFKA_BOOTSTRAP_SERVERS: kafka:29092      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-unift-group}      # ── JWT      # Generate with: openssl rand -base64 64      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}      # ── Logging      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}      LOG_LEVEL_EXCEPTION: ${LOG_LEVEL_EXCEPTION:-INFO}      # ── Swagger UI      # Set to false in production      SWAGGER_TRY_IT_OUT: ${SWAGGER_TRY_IT_OUT:-false}      # ── Remote session settings      UNIFT_SESSION_TTL_MINUTES: ${UNIFT_SESSION_TTL_MINUTES:30}      UNIFT_MAX_SESSIONS_PER_USER: ${UNIFT_MAX_SESSIONS_PER_USER:5}      UNIFT_REAPER_INTERVAL_MS: ${UNIFT_REAPER_INTERVAL_MS:60000}      UNIFT_CONNECT_TIMEOUT_MS: ${UNIFT_CONNECT_TIMEOUT_MS:15000}      UNIFT_CHANNEL_TIMEOUT_MS: ${UNIFT_CHANNEL_TIMEOUT_MS:10000}      UNIFT_SLIDING_TTL: ${UNIFT_SLIDING_TTL:true}volumes:  postgres_data:  zookeeper_data:  zookeeper_log:  kafka_data: