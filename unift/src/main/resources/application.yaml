unift:
  remote:
    session-ttl-minutes: 30          # default session lifetime
    max-sessions-per-user: 5         # cap per authenticated user
    reaper-interval-ms: 60000        # how often the session reaper runs (1 min)
    connect-timeout-ms: 15000        # SSH connect timeout
    channel-timeout-ms: 10000        # SFTP channel open timeout
    sliding-ttl: true                # extend expiresAt on every activity

