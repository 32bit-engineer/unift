spring:
  application:
    name: uniFT
  datasource:
    url: ${DB_URL:jdbc:postgresql://weekend-architect-faizmohd12511251-4e7e.c.aivencloud.com:12746/postgres}
    username: ${DB_USERNAME:avnadmin}
    password: ${DB_PASSWORD:AVNS_4zS3xT1mgcix5Jb3LYr}
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:weekend-architect-kafka-faizmohd12511251-4e7e.l.aivencloud.com:12748}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:unift-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"
        
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.weekend.architect.unift: ${LOG_LEVEL_APP:DEBUG}
    com.weekend.architect.unift.exception: ${LOG_LEVEL_EXCEPTION:DEBUG}
  pattern:
    console: "%d{HH:mm:ss.SSS} [%-5level] [%logger{35}] - %msg%n"

jwt:
  # Generate a secure key with: openssl rand -base64 64
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}      # 15 minutes
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000} # 7 days

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: ${SWAGGER_TRY_IT_OUT:true}

unift:
  remote:
    session-ttl-minutes: ${UNIFT_SESSION_TTL_MINUTES:30}
    max-sessions-per-user: ${UNIFT_MAX_SESSIONS_PER_USER:5}
    reaper-interval-ms: ${UNIFT_REAPER_INTERVAL_MS:60000}
    connect-timeout-ms: ${UNIFT_CONNECT_TIMEOUT_MS:15000}
    channel-timeout-ms: ${UNIFT_CHANNEL_TIMEOUT_MS:10000}
    sliding-ttl: ${UNIFT_SLIDING_TTL:true}

  terminal:
    # Lines in remote shell output that match any of these regex patterns are
    # silently dropped before being forwarded to the WebSocket / Xterm.js client.
    # Use this to hide noisy startup messages from .bashrc / .bash_profile on
    # the remote host (e.g. Homebrew path errors on non-Mac servers).
    suppressed-output-patterns:
      - ".*: .*brew.*: No such file or directory.*"
