services:
  redis:
    image: redis:7-alpine
    container_name: unift-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: unift-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unift
      POSTGRES_USER: unift
      POSTGRES_PASSWORD: unift
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  unift-api:
    image: ghcr.io/32bit-engineer/unift/unift-api:latest
    container_name: unift-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ${STORAGE_PATH:-./storage}:/mnt/storage:rw
    environment:

      # ── Database (required — set in .env file, see .env.example)
      DB_URL: jdbc:postgresql://weekend-architect-faizmohd12511251-4e7e.c.aivencloud.com:12746/postgres
      DB_USERNAME: avnadmin
      DB_PASSWORD: AVNS_4zS3xT1mgcix5Jb3LYr

      # ── Kafka (optional — Kafka is wired but not actively consumed yet)
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-unift-group}

      # ── JWT (required — generate with: openssl rand -base64 64)
      JWT_SECRET: T3BlblNlc3NhbWVTZWNyZXRLZXkyMDI2Rm9yVW5pRlRKV1RBdXRoU2VjdXJpdHk=
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}

      # ── Encryption key (required — generate with: openssl rand -base64 32)
      UNIFT_ENCRYPTION_KEY: BIgne4XbvCWidrvV67B6RsIu/B25H51gUJqqrJYYrfI=

      # ── HTTP CORS — frontend origin is http://localhost (port 80, served by nginx)
      # calling the backend directly at http://localhost:8080
      UNIFT_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:5173

      # ── WebSocket CORS
      UNIFT_TERMINAL_ALLOWED_ORIGINS: ${UNIFT_TERMINAL_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:5173}

      # ── Redis
      REDIS_HOST: redis

      # ── Logging
      LOG_LEVEL_ROOT: INFO
      LOG_LEVEL_APP: INFO
      LOG_LEVEL_EXCEPTION: INFO

      # ── Swagger UI (disable in production)
      SWAGGER_TRY_IT_OUT: true

      # ── Remote session settings
      UNIFT_SESSION_TTL_MINUTES: 30
      UNIFT_MAX_SESSIONS_PER_USER: 5
      UNIFT_REAPER_INTERVAL_MS: 60000
      UNIFT_CONNECT_TIMEOUT_MS: 15000
      UNIFT_CHANNEL_TIMEOUT_MS: 10000
      UNIFT_SLIDING_TTL: true

  unift-fe:
    build:
      context: ./unift-fe
      args:
        # Baked into the JS bundle at build time — must NOT include /api suffix.
        # Frontend calls the backend directly at http://localhost:8080.
        VITE_API_BASE_URL: http://localhost:8080
        VITE_APP_NAME: ${VITE_APP_NAME:-UniFT}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.0.1}
        VITE_ENABLE_DARK_MODE: ${VITE_ENABLE_DARK_MODE:-true}
    image: ghcr.io/32bit-engineer/unift/unift-fe:latest
    container_name: unift-fe
    restart: unless-stopped
    depends_on:
      - unift-api
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  redis-data:
  postgres-data:
