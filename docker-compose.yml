services:  # ─────────────────────────────────────────────  # PostgreSQL — persistent storage  # ─────────────────────────────────────────────  postgres:    image: postgres:16-alpine    container_name: unift-postgres    restart: unless-stopped    environment:      POSTGRES_DB: ${POSTGRES_DB:-unift}      POSTGRES_USER: ${POSTGRES_USER:-unift}      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}    volumes:      - postgres_data:/var/lib/postgresql/data    ports:      - "${POSTGRES_PORT:-5432}:5432"    healthcheck:      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unift} -d ${POSTGRES_DB:-unift}"]      interval: 10s      timeout: 5s      retries: 5  # ─────────────────────────────────────────────  # Zookeeper — required by Kafka  # ─────────────────────────────────────────────  zookeeper:    image: confluentinc/cp-zookeeper:7.6.0    container_name: unift-zookeeper    restart: unless-stopped    environment:      ZOOKEEPER_CLIENT_PORT: 2181      ZOOKEEPER_TICK_TIME: 2000    volumes:      - zookeeper_data:/var/lib/zookeeper/data      - zookeeper_log:/var/lib/zookeeper/log  # ─────────────────────────────────────────────  # Kafka — event broker (audit log)  # ─────────────────────────────────────────────  kafka:    image: confluentinc/cp-kafka:7.6.0    container_name: unift-kafka    restart: unless-stopped    depends_on:      - zookeeper    environment:      KAFKA_BROKER_ID: 1      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092}      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"    volumes:      - kafka_data:/var/lib/kafka/data    ports:      - "${KAFKA_HOST_PORT:-9092}:9092"    healthcheck:      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]      interval: 15s      timeout: 10s      retries: 5  # ─────────────────────────────────────────────  # UniFT API — Spring Boot backend  # ─────────────────────────────────────────────  unift-api:    build:      context: ./unift      dockerfile: Dockerfile    image: unift-api:latest    container_name: unift-api    restart: unless-stopped    depends_on:      postgres:        condition: service_healthy      kafka:        condition: service_healthy    ports:      - "${API_PORT:-8080}:8080"    volumes:      - ${STORAGE_PATH:-/mnt/storage}:/mnt/storage:rw    environment:      # ── Database      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-unift}      DB_USERNAME: ${POSTGRES_USER:-unift}      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}      # ── Kafka (internal broker address, not the host-exposed port)      KAFKA_BOOTSTRAP_SERVERS: kafka:29092      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-unift-group}      # ── JWT      # Generate with: openssl rand -base64 64      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}      # ── Encryption (AES-256-GCM key for SSH credentials at rest)      # Generate with: openssl rand -base64 32      UNIFT_ENCRYPTION_KEY: ${UNIFT_ENCRYPTION_KEY:?UNIFT_ENCRYPTION_KEY is required}      # ── WebSocket CORS — must include the browser-facing origin      # All traffic goes through the nginx frontend proxy, so the      # browser origin is http://localhost (or http://localhost:APP_PORT)      UNIFT_TERMINAL_ALLOWED_ORIGINS: ${UNIFT_TERMINAL_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:5173}      # ── Logging      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}      LOG_LEVEL_EXCEPTION: ${LOG_LEVEL_EXCEPTION:-INFO}      # ── Swagger UI (disable in production)      SWAGGER_TRY_IT_OUT: ${SWAGGER_TRY_IT_OUT:-false}      # ── Remote session settings      UNIFT_SESSION_TTL_MINUTES: ${UNIFT_SESSION_TTL_MINUTES:-30}      UNIFT_MAX_SESSIONS_PER_USER: ${UNIFT_MAX_SESSIONS_PER_USER:-5}      UNIFT_REAPER_INTERVAL_MS: ${UNIFT_REAPER_INTERVAL_MS:-60000}      UNIFT_CONNECT_TIMEOUT_MS: ${UNIFT_CONNECT_TIMEOUT_MS:-15000}      UNIFT_CHANNEL_TIMEOUT_MS: ${UNIFT_CHANNEL_TIMEOUT_MS:-10000}      UNIFT_SLIDING_TTL: ${UNIFT_SLIDING_TTL:-true}  # ─────────────────────────────────────────────  # UniFT Frontend — React/Vite served via Nginx  # Proxies /api/* and /api/ws/* to unift-api  # ─────────────────────────────────────────────  unift-fe:    build:      context: ./unift-fe      dockerfile: Dockerfile      args:        # Baked in at build time — nginx proxy makes it same-origin        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}        VITE_APP_NAME: ${VITE_APP_NAME:-UniFT}        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.0.1}        VITE_ENABLE_DARK_MODE: ${VITE_ENABLE_DARK_MODE:-true}    image: unift-fe:latest    container_name: unift-fe    restart: unless-stopped    depends_on:      - unift-api    ports:      - "${APP_PORT:-80}:80"volumes:  postgres_data:  zookeeper_data:  zookeeper_log:  kafka_data: